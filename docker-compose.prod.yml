version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fuelcore_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fuelcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fuelcore_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fuelcore -d fuelcore_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fuelcore_net

  redis:
    image: redis:7-alpine
    container_name: fuelcore_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fuelcore_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: fuelcore_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./backend/keys:/app/keys
    networks:
      - fuelcore_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: fuelcore_frontend_prod
    restart: always
    depends_on:
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - fuelcore_net

  certbot:
    image: certbot/certbot
    container_name: fuelcore_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${SSL_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN}

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_www:

networks:
  fuelcore_net:
    driver: bridge
