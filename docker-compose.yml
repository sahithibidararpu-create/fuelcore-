version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fuelcore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fuelcore
      POSTGRES_PASSWORD: fuelcore_secret
      POSTGRES_DB: fuelcore_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fuelcore -d fuelcore_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fuelcore_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: fuelcore_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://fuelcore:fuelcore_secret@postgres:5432/fuelcore_db?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./backend/keys:/app/keys
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: fuelcore_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '5173:5173'

volumes:
  postgres_data:
  redis_data:
